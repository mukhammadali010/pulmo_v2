<div class="flex flex-col gap-8">
  <div class="flex flex-col items-center gap-3 lg:hidden">
    <div
      class="flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-sky-600 to-cyan-500 text-white shadow-lg"
    >
      <svg
        viewBox="0 0 24 24"
        class="h-6 w-6"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M12 2v6" />
        <path d="M9 5h6" />
        <path d="M6 8a6 6 0 0 0 12 0" />
        <path d="M6 8v6a6 6 0 0 0 6 6 4 4 0 0 0 4-4v-2" />
        <circle cx="18" cy="14" r="2" />
      </svg>
    </div>
    <span class="text-base font-semibold">{{ 'common.appName' | translate }}</span>
  </div>

  <header class="flex flex-col gap-2">
    <h1 class="text-2xl font-semibold tracking-tight">
      {{ 'auth.login.title' | translate }}
    </h1>
    <p class="text-surface-500 dark:text-surface-300 text-sm">
      {{ 'auth.login.subtitle' | translate }}
    </p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
    <div class="flex flex-col gap-2">
      <label for="email" class="text-sm font-medium">
        {{ 'auth.login.email' | translate }}
      </label>
      <span class="p-input-icon-left">
        <i class="pi pi-envelope"></i>
        <input
          id="email"
          pInputText
          type="email"
          autocomplete="email"
          formControlName="email"
          class="w-full"
          [placeholder]="'auth.login.emailPlaceholder' | translate"
        />
      </span>
    </div>

    <div class="flex flex-col gap-2">
      <div class="flex items-center justify-between">
        <label for="password" class="text-sm font-medium">
          {{ 'auth.login.password' | translate }}
        </label>
        <a class="text-primary-500 text-xs hover:underline" routerLink="/auth/forgot-password">
          {{ 'auth.login.forgot' | translate }}
        </a>
      </div>
      <p-password
        inputId="password"
        formControlName="password"
        [feedback]="false"
        [toggleMask]="true"
        autocomplete="current-password"
        styleClass="w-full"
        inputStyleClass="w-full"
        [placeholder]="'auth.login.passwordPlaceholder' | translate"
      />
    </div>

    <p-button
      type="submit"
      [label]="'auth.login.submit' | translate"
      [loading]="submitting()"
      [disabled]="form.invalid"
      styleClass="w-full"
      size="large"
    />
  </form>

</div>
